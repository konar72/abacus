<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abacus Habit Tracker</title>
<style>
  :root {
    --border: #d0d0d0;
    --border-section: #333;
    --bg-header: #f5f5f5;
    --bg-computed: #f5f5f5;
    --check-color: #222;
    --check-computed: #4a7c59;
    --accent: #000000;
    --hover: #ffffff;
    --hover-cross: #fdf6f0;
    --font: Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    font-size: 13px;
    color: #222;
    background: #fff;
    padding: 20px;
  }

  h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: left;
    margin-bottom: 12px;
    color: #333;
  }

  .table-wrap {
    overflow-x: auto;
    margin-bottom: 8px;
    margin-right: 0;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 960px;
    table-layout: fixed;
  }

  th, td {
    border: 1px solid var(--border);
    padding: 4px 3px;
    text-align: center;
    vertical-align: middle;
    height: 28px;
  }

  /* Column widths */
  col.col-why   { width: 40px; }
  col.col-habit { width: 400px; }
  col.col-freq  { width: 62px; }
  col.col-day   { width: 30px; }
  col.col-week  { width: 32px; }
  col.col-month { width: 30px; }
  col.col-del   { width: 20px; }

  /* Section group headers */
  thead tr:first-child th {
    background: #fff;
    border: none;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #555;
    padding-bottom: 2px;
  }

  thead tr:nth-child(2) th {
    background: var(--bg-header);
    font-size: 11px;
    font-weight: 700;
    color: #333;
  }

  /* Section dividers */
  .section-start {
    border-left: 2px solid var(--border-section) !important;
  }

  /* Editable cells */
  td.editable {
    text-align: left;
    padding: 4px 6px;
    cursor: text;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  td.editable:focus {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    background: #fff;
  }

  td.cell-why {
    font-size: 14px;
    text-align: center;
    cursor: text;
    max-width: 40px;
  }

  td.cell-freq {
    font-size: 11px;
    text-align: center;
    white-space: nowrap;
  }

  /* Toggle cells */
  td.toggle-cell {
    cursor: pointer;
    user-select: none;
    font-size: 15px;
    color: var(--check-color);
  }
  /* Row/column crosshair highlight */
  tr.row-highlight td:not(.row-delete) { background: var(--hover-cross); }
  tr.row-highlight td.computed { background: #ededed; }
  td.col-highlight { background: var(--hover-cross) !important; }
  td.computed.col-highlight { background: #ededed !important; }
  td.cell-hover {
    background: var(--hover) !important;
    outline: 1.5px solid #ccc;
    outline-offset: -1.5px;
  }
  td.toggle-cell.checked::after {
    content: "✓";
  }

  /* Computed cells */
  td.computed {
    background: var(--bg-computed);
    user-select: none;
    font-size: 14px;
    color: var(--check-computed);
  }
  td.computed.has-count {
    font-size: 12px;
    font-weight: 600;
  }

  /* Current day column highlight */
  td.current-day {
    border-left: 2px solid #e86c2d !important;
    border-right: 2px solid #e86c2d !important;
  }
  th.current-day-header {
    background: #e86c2d !important;
    color: #fff !important;
    border-left: 2px solid #e86c2d !important;
    border-right: 2px solid #e86c2d !important;
  }

  /* Current week (in month) highlight */
  td.current-week {
    background: #ebebeb;
  }
  th.current-week-header {
    background: #d9d9d9 !important;
    color: #333 !important;
    font-weight: 800 !important;
  }

  /* Current month highlight */
  td.current-month {
    background: #ebebeb;
  }
  th.current-month-header {
    background: #d9d9d9 !important;
    color: #333 !important;
    font-weight: 800 !important;
  }

  /* Add row button */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .actions button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    color: #555;
  }
  .actions button:hover { background: var(--bg-header); }

  /* Delete button */
  td.row-delete {
    border: none;
    background: none;
    cursor: pointer;
    color: #ccc;
    font-size: 14px;
    width: 20px;
    padding: 0 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  tr:hover td.row-delete { opacity: 1; }
  td.row-delete:hover { color: #e44; }

  /* Tagline */
  .tagline {
    font-size: 11px;
    color: #777;
    margin-top: 12px;
    border-top: 2px solid var(--accent);
    padding-top: 6px;
    display: flex;
    gap: 24px;
  }
  .tagline span { white-space: nowrap; }
  .tagline b { font-weight: 700; }

  /* Crown emoji row (last habit row) */
  .crown-row td { border-bottom: 2px solid var(--border-section); }

  /* Print styles */
  @media print {
    body { padding: 0; font-size: 10pt; }
    @page { size: landscape; margin: 0.4in; }
    .no-print { display: none !important; }
    table { min-width: unset; width: 100%; }
    td.toggle-cell:hover, td.editable:hover { background: transparent; }
    .row-delete { display: none; }
    h1 { font-size: 10pt; }
  }
</style>
</head>
<body>

<h1>ABACUS HABIT TRACKER</h1>

<div class="table-wrap">
  <table id="tracker">
    <colgroup>
      <col class="col-why">
      <col class="col-habit">
      <col class="col-freq">
      <!-- Week view: 7 days -->
      <col class="col-day">
      <col class="col-day">
      <col class="col-day">
      <col class="col-day">
      <col class="col-day">
      <col class="col-day">
      <col class="col-day">
      <!-- Month view: up to 5 weeks -->
      <col class="col-week">
      <col class="col-week">
      <col class="col-week">
      <col class="col-week">
      <col class="col-week">
      <!-- Year view: 12 months -->
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-month">
      <col class="col-del no-print">
    </colgroup>
    <thead>
      <tr>
        <th colspan="2">
        <th colspan="1" style="border-bottom:1px solid var(--border);">FREQ.</th>
        <th colspan="7" style="border-bottom:1px solid var(--border);">THIS WEEK</th>
        <th colspan="5" class="section-start" style="border-bottom:1px solid var(--border);">THIS MONTH</th>
        <th colspan="12" class="section-start" style="border-bottom:1px solid var(--border);">THIS YEAR</th>
        <th style="border:none;"></th>
      </tr>
      <tr>
        <th>Why?</th>
        <th style="text-align:center;padding-left:6px;">Habits</th>
        <th># / Time</th>
        <th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th><th>S</th>
        <th class="section-start">W1</th><th>W2</th><th>W3</th><th>W4</th><th>W5</th>
        <th class="section-start" id="mh01">01</th><th id="mh02">02</th><th id="mh03">03</th><th id="mh04">04</th><th id="mh05">05</th><th id="mh06">06</th><th id="mh07">07</th><th id="mh08">08</th><th id="mh09">09</th><th id="mh10">10</th><th id="mh11">11</th><th id="mh12">12</th>
        <th style="border:none;"></th>
      </tr>
    </thead>
    <tbody id="habitRows"></tbody>
  </table>
</div>

<div class="actions no-print">
  <button onclick="addHabit()">+ Add habit</button>
</div>

<div class="tagline">
  <!-- <span>Your <b>daily</b> actions…</span>
  <span>turn into <b>weekly</b> habits…</span>
  <span>which compound into <b>monthly</b> results…</span>
  <span>and become <b>lifelong</b> transformations</span> -->
  <span style="margin-left:auto;font-weight:600;color:#333;letter-spacing:1px;">ABACUS HABIT TRACKER</span>
</div>

<script>
(function() {
  // ── Date helpers ──
  function getISOWeek(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  }

  function getISOYear(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    return d.getUTCFullYear();
  }

  function getWeekStart(isoYear, isoWeek) {
    const jan4 = new Date(Date.UTC(isoYear, 0, 4));
    const dayOfWeek = jan4.getUTCDay() || 7;
    const monday = new Date(jan4);
    monday.setUTCDate(jan4.getUTCDate() - dayOfWeek + 1 + (isoWeek - 1) * 7);
    return monday;
  }

  function getWeeksInMonth(year, month) {
    // Returns array of ISO week numbers that overlap with the given month (1-indexed)
    const weeks = [];
    const firstDay = new Date(year, month - 1, 1);
    const lastDay = new Date(year, month, 0);
    const seen = new Set();
    for (let d = new Date(firstDay); d <= lastDay; d.setDate(d.getDate() + 1)) {
      const w = getISOWeek(d);
      const iy = getISOYear(d);
      const key = iy + '-' + w;
      if (!seen.has(key)) {
        seen.add(key);
        weeks.push({ isoYear: iy, week: w });
      }
    }
    return weeks;
  }

  // ── Data layer ──
  const STORAGE_KEY = 'abacus-habits';

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
  }

  function defaultData() {
    const now = new Date();
    return {
      version: 1,
      year: now.getFullYear(),
      habits: [
        {
          id: generateId(),
          name: 'Use habit tracker',
          why: '☺',
          freqCount: 6,
          freqPeriod: 'Wk',
          daily: {}
        },
        ...Array.from({ length: 14 }, () => ({
          id: generateId(),
          name: '',
          why: '',
          freqCount: null,
          freqPeriod: 'Wk',
          daily: {}
        }))
      ]
    };
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (d && d.habits) return d;
      }
    } catch(e) {}
    return defaultData();
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  let data = loadData();

  // ── State (always current week) ──
  const now = new Date();
  const viewYear = getISOYear(now);
  const viewWeek = getISOWeek(now);
  const viewMonth = now.getMonth() + 1;

  // ── Computation ──
  function weekKey(isoYear, week) {
    return isoYear + '-W' + week;
  }

  function getDayChecks(habit, isoYear, week) {
    const key = weekKey(isoYear, week);
    return habit.daily[key] || [false,false,false,false,false,false,false];
  }

  function setDayCheck(habit, isoYear, week, dayIndex, value) {
    const key = weekKey(isoYear, week);
    if (!habit.daily[key]) habit.daily[key] = [false,false,false,false,false,false,false];
    habit.daily[key][dayIndex] = value;
  }

  function countCheckedDays(habit, isoYear, week) {
    return getDayChecks(habit, isoYear, week).filter(Boolean).length;
  }

  function isWeekMet(habit, isoYear, week) {
    if (!habit.freqCount) return false;
    return countCheckedDays(habit, isoYear, week) >= habit.freqCount;
  }

  function isMonthMet(habit, year, month) {
    if (!habit.freqCount) return false;
    const weeks = getWeeksInMonth(year, month);
    if (weeks.length === 0) return false;
    const metCount = weeks.filter(w => isWeekMet(habit, w.isoYear, w.week)).length;
    return metCount >= Math.ceil(weeks.length * 0.75);
  }

  function hasMonthStarted(year, month) {
    const today = new Date();
    const monthStart = new Date(year, month - 1, 1);
    return today >= monthStart;
  }

  function hasWeekStarted(isoYear, week) {
    const today = new Date();
    const ws = getWeekStart(isoYear, week);
    return today >= ws;
  }

  // ── Actions ──
  window.addHabit = function() {
    data.habits.push({
      id: generateId(),
      name: '',
      why: '',
      freqCount: null,
      freqPeriod: 'Wk',
      daily: {}
    });
    saveData();
    render();
  };

  function deleteHabit(id) {
    data.habits = data.habits.filter(h => h.id !== id);
    saveData();
    render();
  }

  function toggleDay(habitId, dayIndex) {
    const habit = data.habits.find(h => h.id === habitId);
    if (!habit) return;
    const checks = getDayChecks(habit, viewYear, viewWeek);
    setDayCheck(habit, viewYear, viewWeek, dayIndex, !checks[dayIndex]);
    saveData();
    render();
  }

  function updateField(habitId, field, value) {
    const habit = data.habits.find(h => h.id === habitId);
    if (!habit) return;
    if (field === 'freq') {
      const match = value.match(/(\d+)\s*[\/\\]\s*(\w+)/);
      if (match) {
        habit.freqCount = parseInt(match[1]);
        habit.freqPeriod = match[2];
      } else {
        const numMatch = value.match(/(\d+)/);
        habit.freqCount = numMatch ? parseInt(numMatch[1]) : null;
      }
    } else {
      habit[field] = value;
    }
    saveData();
  }

  // ── Render ──
  // Current day of week: 0=Mon, 6=Sun
  const currentDayIndex = (now.getDay() + 6) % 7;

  function render() {
    const weeksInMonth = getWeeksInMonth(data.year, viewMonth);
    const currentMonth = viewMonth;
    const currentYear = now.getFullYear();

    // Highlight current day header
    const dayHeaderCells = document.querySelectorAll('thead tr:nth-child(2) th');
    dayHeaderCells.forEach((th, i) => {
      // Day headers are at indices 3-9 (after Why, Habits, #/Time)
      if (i >= 3 && i <= 9) {
        const dayIdx = i - 3;
        if (dayIdx === currentDayIndex) {
          th.classList.add('current-day-header');
        } else {
          th.classList.remove('current-day-header');
        }
      }
    });

    // Find current week index within month (0-4)
    const currentWeekInMonth = weeksInMonth.findIndex(w => w.isoYear === viewYear && w.week === viewWeek);

    // Highlight current week header (W1-W5)
    const headerCells2 = document.querySelectorAll('thead tr:nth-child(2) th');
    headerCells2.forEach((th, i) => {
      // Week headers are at indices 10-14 (after Why, Habits, #/Time, M-S)
      if (i >= 10 && i <= 14) {
        const wIdx = i - 10;
        if (wIdx === currentWeekInMonth) {
          th.classList.add('current-week-header');
        } else {
          th.classList.remove('current-week-header');
        }
      }
    });

    // Highlight current month header
    for (let m = 1; m <= 12; m++) {
      const el = document.getElementById('mh' + String(m).padStart(2, '0'));
      if (m === currentMonth && data.year === currentYear) {
        el.className = (m === 1 ? 'section-start ' : '') + 'current-month-header';
      } else {
        el.className = (m === 1 ? 'section-start' : '');
        el.style.fontWeight = '';
      }
    }

    // Build rows
    const tbody = document.getElementById('habitRows');
    tbody.innerHTML = '';

    data.habits.forEach((habit, idx) => {
      const tr = document.createElement('tr');

      // Why
      const tdWhy = document.createElement('td');
      tdWhy.className = 'cell-why editable';
      tdWhy.contentEditable = 'true';
      tdWhy.textContent = habit.why;
      tdWhy.addEventListener('blur', () => updateField(habit.id, 'why', tdWhy.textContent.trim()));
      tdWhy.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); tdWhy.blur(); }});
      tr.appendChild(tdWhy);

      // Name
      const tdName = document.createElement('td');
      tdName.className = 'editable';
      tdName.contentEditable = 'true';
      tdName.textContent = habit.name;
      tdName.style.textAlign = 'left';
      tdName.style.paddingLeft = '6px';
      tdName.addEventListener('blur', () => updateField(habit.id, 'name', tdName.textContent.trim()));
      tdName.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); tdName.blur(); }});
      tr.appendChild(tdName);

      // Frequency
      const tdFreq = document.createElement('td');
      tdFreq.className = 'cell-freq editable';
      tdFreq.contentEditable = 'true';
      tdFreq.textContent = habit.freqCount ? `${habit.freqCount} / ${habit.freqPeriod}` : '/';
      tdFreq.addEventListener('blur', () => updateField(habit.id, 'freq', tdFreq.textContent.trim()));
      tdFreq.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); tdFreq.blur(); }});
      tr.appendChild(tdFreq);

      // Daily cells (M-S)
      const checks = getDayChecks(habit, viewYear, viewWeek);
      for (let d = 0; d < 7; d++) {
        const td = document.createElement('td');
        td.className = 'toggle-cell' + (checks[d] ? ' checked' : '') + (d === currentDayIndex ? ' current-day' : '');
        td.addEventListener('click', () => toggleDay(habit.id, d));
        tr.appendChild(td);
      }

      // Weekly cells (W1-W5) — show count of checked days
      for (let w = 0; w < 5; w++) {
        const td = document.createElement('td');
        td.className = 'computed' + (w === 0 ? ' section-start' : '');
        if (w === currentWeekInMonth) td.classList.add('current-week');
        if (w < weeksInMonth.length) {
          const wk = weeksInMonth[w];
          const count = countCheckedDays(habit, wk.isoYear, wk.week);
          if (count > 0) {
            td.textContent = count;
            td.classList.add('has-count');
          }
        }
        tr.appendChild(td);
      }

      // Monthly cells (01-12) — show count of met weeks
      for (let m = 1; m <= 12; m++) {
        const td = document.createElement('td');
        td.className = 'computed' + (m === 1 ? ' section-start' : '');
        if (m === currentMonth && data.year === currentYear) {
          td.classList.add('current-month');
        }
        if (habit.freqCount) {
          const monthWeeks = getWeeksInMonth(data.year, m);
          const metCount = monthWeeks.filter(w => isWeekMet(habit, w.isoYear, w.week)).length;
          if (metCount > 0) {
            td.textContent = metCount;
            td.classList.add('has-count');
          }
        }
        tr.appendChild(td);
      }

      // Delete button
      const tdDel = document.createElement('td');
      tdDel.className = 'row-delete no-print';
      tdDel.textContent = '×';
      tdDel.title = 'Remove habit';
      tdDel.addEventListener('click', () => {
        if (habit.name && !confirm(`Remove "${habit.name}"?`)) return;
        deleteHabit(habit.id);
      });
      tr.appendChild(tdDel);

      tbody.appendChild(tr);
    });
  }

  // Prevent pasting rich text into contenteditable cells
  document.addEventListener('paste', function(e) {
    if (e.target.contentEditable === 'true') {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    }
  });

  // Crosshair highlight on hover
  const table = document.getElementById('tracker');
  table.addEventListener('mouseover', function(e) {
    const td = e.target.closest('td');
    if (!td) return;

    // Clear previous highlights
    table.querySelectorAll('.row-highlight').forEach(r => r.classList.remove('row-highlight'));
    table.querySelectorAll('.col-highlight').forEach(c => c.classList.remove('col-highlight'));
    table.querySelectorAll('.cell-hover').forEach(c => c.classList.remove('cell-hover'));

    // Skip crosshair for computed (ineditable) cells
    if (td.classList.contains('computed') || td.classList.contains('row-delete')) return;

    const tr = td.parentElement;
    const colIndex = td.cellIndex;

    // Highlight row
    tr.classList.add('row-highlight');

    // Highlight column
    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(r => {
      const cell = r.cells[colIndex];
      if (cell && cell !== td) cell.classList.add('col-highlight');
    });

    // Highlight active cell
    td.classList.add('cell-hover');
  });

  table.addEventListener('mouseleave', function() {
    table.querySelectorAll('.row-highlight').forEach(r => r.classList.remove('row-highlight'));
    table.querySelectorAll('.col-highlight').forEach(c => c.classList.remove('col-highlight'));
    table.querySelectorAll('.cell-hover').forEach(c => c.classList.remove('cell-hover'));
  });

  render();
})();
</script>

</body>
</html>
